# Kiosk browser selector. Valid values: touchkio, chromium
KIOSK_BROWSER=touchkio
KIOSK_URL=http://192.168.1.72:8123/rpi-touch/display
KIOSK_WIDTH=1920
KIOSK_HEIGHT=1080
KIOSK_X=0
KIOSK_Y=0
KIOSK_ZOOM=1.0

TOUCHKIO_BIN=/usr/bin/touchkio
TOUCHKIO_USER_DATA_DIR=/home/sundeep/.touchkio1
TOUCHKIO_WEB_WIDGET=false
TOUCHKIO_WINDOW_CLASS=touchkio
TOUCHKIO_MAX_RSS_KB=2300000
TOUCHKIO_ENFORCE_FULLSCREEN=true
TOUCHKIO_FULLSCREEN_WAIT_SECONDS=20

CHROMIUM_BIN=auto
CHROMIUM_USER_DATA_DIR=/home/sundeep/.chromium-kiosk-view1
CHROMIUM_WINDOW_CLASS=chromium
CHROMIUM_MAX_RSS_KB=1800000
# Set to 0 to disable. Bound to localhost only for performance checks.
CHROMIUM_REMOTE_DEBUGGING_PORT=9222
